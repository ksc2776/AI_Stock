<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="EQV 실시간 수급·매매 분석 핵심 인사이트" />
  <title>Antigravity EQV Quant Agent</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* Prevent horizontal overflow on small screens */
    html, body, #root { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; }
    img, video, iframe { max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Auto-scale page to fit narrow/folded viewports (Galaxy Fold fixes)
    (function(){
      function fitScale(){
        var container = document.querySelector('.app-container') || document.getElementById('root');
        if(!container) return;
        // reset previous
        container.style.transformOrigin = 'left top';
        container.style.transform = '';
        document.body.style.height = '';

        // measure content width
        var contentWidth = Math.max(container.scrollWidth || 0, container.offsetWidth || 0);
        var vw = window.innerWidth || document.documentElement.clientWidth;
        if(contentWidth > vw){
          var scale = vw / contentWidth;
          // clamp scale to reasonable range
          if(scale < 0.6) scale = 0.6;
          container.style.transform = 'scale(' + scale + ')';
          // maintain layout height to avoid cropping
          var rect = container.getBoundingClientRect();
          document.body.style.height = Math.ceil(rect.height * scale) + 'px';
        } else {
          container.style.transform = '';
          document.body.style.height = '';
        }
      }
      window.addEventListener('resize', fitScale);
      window.addEventListener('orientationchange', function(){ setTimeout(fitScale,200); });
      document.addEventListener('DOMContentLoaded', function(){ setTimeout(fitScale,120); });
      // run early in case SPA mounts later
      setTimeout(fitScale, 500);
      // also poll briefly for dynamic layout changes
      var polls = 0; var pollId = setInterval(function(){ fitScale(); if(++polls>6) clearInterval(pollId); }, 400);
    })();
  </script>
</body>
</html>

# Google Cloud Build 자동 배포 설정
# GitHub 푸시 시 자동으로 트리거되어 Cloud Run에 배포됨

steps:
  # Step 1: Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/stock-app/stock-app:$BUILD_ID'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/stock-app/stock-app:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-image'

  # Step 2: Docker 이미지를 Google Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/stock-app/stock-app:$BUILD_ID'
    id: 'push-image'

  # Step 3: Cloud Run에 배포
  - name: 'gcr.io/cloud-builders/gke-deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'stock-app'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/stock-app/stock-app:$BUILD_ID'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production'

# 이미지 저장소
images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/stock-app/stock-app:$BUILD_ID'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/stock-app/stock-app:latest'

# 빌드 타임아웃 (60분)
timeout: 3600s

